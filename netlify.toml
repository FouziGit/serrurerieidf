[build]
  publish = "."
  command = "node generate-slugs.js"

[functions]
  directory = "netlify/functions"

# === Performance Headers ===
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://*.netlify.app"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/xml"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# === Redirections ===
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/zones-intervention"
  to = "/zones-intervention.html"
  status = 200

# Trailing slash normalization
[[redirects]]
  from = "/zones-intervention/"
  to = "/zones-intervention.html"
  status = 200

# Legal pages
[[redirects]]
  from = "/mentions-legales"
  to = "/mentions-legales.html"
  status = 200

[[redirects]]
  from = "/mentions-legales/"
  to = "/mentions-legales.html"
  status = 200

[[redirects]]
  from = "/politique-de-confidentialite"
  to = "/politique-de-confidentialite.html"
  status = 200

[[redirects]]
  from = "/politique-de-confidentialite/"
  to = "/politique-de-confidentialite.html"
  status = 200
