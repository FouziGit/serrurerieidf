<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="400" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111820"/>
      <stop offset="100%" style="stop-color:#1a2535"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a"/>
      <stop offset="100%" style="stop-color:#2a2a2a"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8c4b8"/>
      <stop offset="50%" style="stop-color:#b8b4a8"/>
      <stop offset="100%" style="stop-color:#a8a49a"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4956a"/>
      <stop offset="100%" style="stop-color:#b87848"/>
    </linearGradient>
    <linearGradient id="fobGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a8fd4"/>
      <stop offset="100%" style="stop-color:#2a6ab0"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040"/>
      <stop offset="100%" style="stop-color:#c89020"/>
    </linearGradient>
    <linearGradient id="vigikBtn" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#333333"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background wall -->
  <rect width="400" height="180" fill="url(#bg)"/>

  <!-- Wall texture (dark grey like in photo) -->
  <rect x="0" y="0" width="400" height="180" fill="url(#wallGrad)" opacity="0.85"/>
  <!-- subtle grain -->
  <rect x="0" y="0" width="400" height="180" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="60" stroke-dasharray="1,80"/>

  <!-- ===== INTERPHONE PANEL ===== -->
  <g filter="url(#shadow)">
    <!-- Panel body -->
    <rect x="95" y="10" width="180" height="162" rx="6" fill="url(#panelGrad)" stroke="#888" stroke-width="1"/>
    <!-- Panel inner border -->
    <rect x="99" y="14" width="172" height="154" rx="4" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>

    <!-- Left column: speaker + vigik reader -->
    <!-- Speaker grille area -->
    <rect x="103" y="18" width="78" height="72" rx="3" fill="rgba(0,0,0,0.12)" stroke="rgba(0,0,0,0.2)" stroke-width="0.8"/>
    <!-- Speaker dots grid -->
    <g fill="rgba(80,70,60,0.7)">
      <!-- Row 1 -->
      <circle cx="117" cy="32" r="1.5"/><circle cx="124" cy="32" r="1.5"/><circle cx="131" cy="32" r="1.5"/>
      <circle cx="138" cy="32" r="1.5"/><circle cx="145" cy="32" r="1.5"/><circle cx="152" cy="32" r="1.5"/>
      <circle cx="159" cy="32" r="1.5"/><circle cx="166" cy="32" r="1.5"/>
      <!-- Row 2 -->
      <circle cx="117" cy="39" r="1.5"/><circle cx="124" cy="39" r="1.5"/><circle cx="131" cy="39" r="1.5"/>
      <circle cx="138" cy="39" r="1.5"/><circle cx="145" cy="39" r="1.5"/><circle cx="152" cy="39" r="1.5"/>
      <circle cx="159" cy="39" r="1.5"/><circle cx="166" cy="39" r="1.5"/>
      <!-- Row 3 -->
      <circle cx="117" cy="46" r="1.5"/><circle cx="124" cy="46" r="1.5"/><circle cx="131" cy="46" r="1.5"/>
      <circle cx="138" cy="46" r="1.5"/><circle cx="145" cy="46" r="1.5"/><circle cx="152" cy="46" r="1.5"/>
      <circle cx="159" cy="46" r="1.5"/><circle cx="166" cy="46" r="1.5"/>
      <!-- Row 4 -->
      <circle cx="117" cy="53" r="1.5"/><circle cx="124" cy="53" r="1.5"/><circle cx="131" cy="53" r="1.5"/>
      <circle cx="138" cy="53" r="1.5"/><circle cx="145" cy="53" r="1.5"/><circle cx="152" cy="53" r="1.5"/>
      <circle cx="159" cy="53" r="1.5"/><circle cx="166" cy="53" r="1.5"/>
      <!-- Row 5 -->
      <circle cx="117" cy="60" r="1.5"/><circle cx="124" cy="60" r="1.5"/><circle cx="131" cy="60" r="1.5"/>
      <circle cx="138" cy="60" r="1.5"/><circle cx="145" cy="60" r="1.5"/><circle cx="152" cy="60" r="1.5"/>
      <circle cx="159" cy="60" r="1.5"/><circle cx="166" cy="60" r="1.5"/>
      <!-- Row 6 -->
      <circle cx="117" cy="67" r="1.5"/><circle cx="124" cy="67" r="1.5"/><circle cx="131" cy="67" r="1.5"/>
      <circle cx="138" cy="67" r="1.5"/><circle cx="145" cy="67" r="1.5"/><circle cx="152" cy="67" r="1.5"/>
      <circle cx="159" cy="67" r="1.5"/><circle cx="166" cy="67" r="1.5"/>
      <!-- Row 7 -->
      <circle cx="117" cy="74" r="1.5"/><circle cx="124" cy="74" r="1.5"/><circle cx="131" cy="74" r="1.5"/>
      <circle cx="138" cy="74" r="1.5"/><circle cx="145" cy="74" r="1.5"/><circle cx="152" cy="74" r="1.5"/>
      <circle cx="159" cy="74" r="1.5"/><circle cx="166" cy="74" r="1.5"/>
    </g>

    <!-- VIGIK reader circle -->
    <circle cx="142" cy="122" r="20" fill="url(#vigikBtn)" stroke="#555" stroke-width="1.5"/>
    <circle cx="142" cy="122" r="16" fill="rgba(10,10,10,0.8)" stroke="rgba(80,80,80,0.5)" stroke-width="0.8"/>
    <!-- Vigik symbol (2 arcs + dot) -->
    <g filter="url(#glow)">
      <path d="M133,122 A9,9 0 0 1 151,122" fill="none" stroke="rgba(240,192,64,0.9)" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M136,118 A8,8 0 0 1 148,118" fill="none" stroke="rgba(240,192,64,0.7)" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="142" cy="126" r="2.5" fill="rgba(240,192,64,0.9)"/>
    </g>
    <!-- VIGIK text under circle -->
    <text x="142" y="148" font-family="Arial, sans-serif" font-size="7" font-weight="700" fill="rgba(60,50,40,0.9)" text-anchor="middle" letter-spacing="1.5">VIGIK</text>

    <!-- Right column: display + keypad -->
    <!-- LCD display -->
    <rect x="185" y="18" width="84" height="30" rx="3" fill="rgba(140,160,100,0.3)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <rect x="188" y="21" width="78" height="24" rx="2" fill="rgba(120,140,80,0.25)"/>
    <text x="227" y="35" font-family="monospace" font-size="7" fill="rgba(80,100,50,0.7)" text-anchor="middle">- - - - - - - -</text>

    <!-- Control buttons row -->
    <g fill="rgba(180,175,165,0.9)" stroke="rgba(100,95,85,0.6)" stroke-width="0.8">
      <rect x="188" y="55" width="14" height="10" rx="2"/>
      <rect x="206" y="55" width="14" height="10" rx="2"/>
      <rect x="224" y="55" width="14" height="10" rx="2"/>
      <rect x="242" y="55" width="14" height="10" rx="2"/>
      <rect x="260" y="55" width="14" height="10" rx="2"/>
    </g>

    <!-- Keypad 3x4 grid -->
    <g fill="rgba(175,170,160,0.95)" stroke="rgba(100,95,85,0.5)" stroke-width="0.8">
      <!-- Row 1 -->
      <rect x="191" y="72" width="16" height="13" rx="2"/>
      <rect x="213" y="72" width="16" height="13" rx="2"/>
      <rect x="235" y="72" width="16" height="13" rx="2"/>
      <!-- Row 2 -->
      <rect x="191" y="90" width="16" height="13" rx="2"/>
      <rect x="213" y="90" width="16" height="13" rx="2"/>
      <rect x="235" y="90" width="16" height="13" rx="2"/>
      <!-- Row 3 -->
      <rect x="191" y="108" width="16" height="13" rx="2"/>
      <rect x="213" y="108" width="16" height="13" rx="2"/>
      <rect x="235" y="108" width="16" height="13" rx="2"/>
      <!-- Row 4 -->
      <rect x="191" y="126" width="16" height="13" rx="2"/>
      <rect x="213" y="126" width="16" height="13" rx="2"/>
      <rect x="235" y="126" width="16" height="13" rx="2"/>
    </g>
    <!-- Keypad digits -->
    <g font-family="Arial, sans-serif" font-size="7" fill="rgba(60,55,50,0.8)" text-anchor="middle">
      <text x="199" y="82">1</text><text x="221" y="82">2</text><text x="243" y="82">3</text>
      <text x="199" y="100">4</text><text x="221" y="100">5</text><text x="243" y="100">6</text>
      <text x="199" y="118">7</text><text x="221" y="118">8</text><text x="243" y="118">9</text>
      <text x="199" y="136">*</text><text x="221" y="136">0</text><text x="243" y="136">#</text>
    </g>

    <!-- Bottom strip -->
    <rect x="103" y="150" width="168" height="18" rx="3" fill="rgba(0,0,0,0.1)" stroke="rgba(0,0,0,0.15)" stroke-width="0.5"/>
    <text x="187" y="162" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(80,70,60,0.7)" text-anchor="middle" letter-spacing="0.5">AIPHONE</text>
  </g>

  <!-- ===== HAND holding key fob ===== -->
  <g filter="url(#shadow)" transform="translate(10, 85)">
    <!-- Palm/hand shape -->
    <ellipse cx="75" cy="68" rx="38" ry="22" fill="url(#skinGrad)" transform="rotate(-25, 75, 68)"/>
    <!-- Thumb -->
    <ellipse cx="44" cy="55" rx="10" ry="16" fill="url(#skinGrad)" transform="rotate(-40, 44, 55)"/>
    <!-- Fingers suggestion -->
    <ellipse cx="92" cy="80" rx="28" ry="9" fill="url(#skinGrad)" transform="rotate(-20, 92, 80)" opacity="0.9"/>
    <!-- Knuckle highlights -->
    <ellipse cx="78" cy="60" rx="36" ry="19" fill="rgba(220,160,110,0.3)" transform="rotate(-25, 78, 60)"/>

    <!-- KEY RING -->
    <circle cx="65" cy="72" r="7" fill="none" stroke="rgba(180,160,60,0.9)" stroke-width="2.5"/>
    <circle cx="65" cy="72" r="4.5" fill="none" stroke="rgba(160,140,50,0.7)" stroke-width="1"/>

    <!-- KEY FOB BADGE (blue oval like in photo) -->
    <g transform="translate(52, 52) rotate(-35)">
      <ellipse cx="0" cy="0" rx="12" ry="18" fill="url(#fobGrad)" stroke="rgba(100,150,220,0.6)" stroke-width="1"/>
      <!-- Hole at top -->
      <circle cx="0" cy="-13" r="3" fill="rgba(30,30,30,0.9)" stroke="rgba(80,120,180,0.5)" stroke-width="0.8"/>
      <!-- Vigik logo on fob -->
      <g filter="url(#glow)" opacity="0.9">
        <path d="-5,3 A5,5 0 0 1 5,3" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        <circle cx="0" cy="5" r="1.8" fill="white"/>
      </g>
    </g>

    <!-- Extra key on ring -->
    <g transform="translate(78, 58) rotate(20)">
      <!-- Key stem -->
      <rect x="-2" y="-16" width="4" height="20" rx="2" fill="rgba(180,160,60,0.85)"/>
      <!-- Key bow (ring) -->
      <circle cx="0" cy="-18" r="5" fill="none" stroke="rgba(180,160,60,0.85)" stroke-width="2.5"/>
      <!-- Key bits -->
      <rect x="2" y="-4" width="4" height="2" rx="1" fill="rgba(160,140,50,0.85)"/>
      <rect x="2" y="0" width="3" height="2" rx="1" fill="rgba(160,140,50,0.85)"/>
    </g>
  </g>

  <!-- ===== GLOW / SCAN EFFECT on Vigik reader ===== -->
  <circle cx="142" cy="122" r="22" fill="none" stroke="rgba(240,192,64,0.15)" stroke-width="8" filter="url(#glowStrong)"/>
  <circle cx="142" cy="122" r="30" fill="none" stroke="rgba(240,192,64,0.06)" stroke-width="12" filter="url(#glowStrong)"/>

  <!-- RF wave lines emanating from reader toward fob -->
  <g opacity="0.5" filter="url(#glow)">
    <path d="M122,122 Q100,105 88,95" fill="none" stroke="#f0c040" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="4,3"/>
    <path d="M122,116 Q104,100 94,88" fill="none" stroke="#f0c040" stroke-width="1" stroke-linecap="round" stroke-dasharray="3,4"/>
    <path d="M120,128 Q102,115 90,108" fill="none" stroke="#f0c040" stroke-width="1" stroke-linecap="round" stroke-dasharray="3,5"/>
  </g>

  <!-- ===== LABEL annotations ===== -->
  <!-- Vigik reader label -->
  <line x1="165" y1="110" x2="310" y2="90" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
  <circle cx="310" cy="90" r="2" fill="rgba(255,255,255,0.6)"/>
  <text x="314" y="87" font-family="Arial, sans-serif" font-size="8.5" font-weight="700" fill="rgba(255,255,255,0.85)">LECTEUR VIGIK</text>
  <text x="314" y="98" font-family="Arial, sans-serif" font-size="7.5" fill="rgba(180,200,240,0.6)">Contrôle d'accès</text>

  <!-- Badge label -->
  <line x1="62" y1="118" x2="20" y2="158" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
  <circle cx="20" cy="158" r="2" fill="rgba(255,255,255,0.6)"/>
  <text x="22" y="154" font-family="Arial, sans-serif" font-size="8.5" font-weight="700" fill="rgba(255,255,255,0.85)">BADGE</text>
  <text x="22" y="165" font-family="Arial, sans-serif" font-size="7.5" fill="rgba(180,200,240,0.6)">Porte-clé Vigik</text>

  <!-- Digicode label -->
  <line x1="260" y1="100" x2="318" y2="135" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
  <circle cx="318" cy="135" r="2" fill="rgba(255,255,255,0.6)"/>
  <text x="322" y="131" font-family="Arial, sans-serif" font-size="8.5" font-weight="700" fill="rgba(255,255,255,0.85)">DIGICODE</text>
  <text x="322" y="142" font-family="Arial, sans-serif" font-size="7.5" fill="rgba(180,200,240,0.6)">Interphone</text>

  <!-- Bottom title bar -->
  <rect x="0" y="154" width="400" height="26" fill="rgba(0,0,0,0.55)"/>
  <rect x="0" y="154" width="400" height="2" fill="rgba(240,192,64,0.6)"/>
  <text x="200" y="171" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="rgba(240,192,64,0.95)" text-anchor="middle" letter-spacing="2">REPRODUCTION DE BADGE D'ENTRÉE IMMEUBLE</text>
</svg>
